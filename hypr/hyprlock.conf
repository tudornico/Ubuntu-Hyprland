# /* ---- 💫 Cyberpunk / Darcula Hyprlock ---- */  #

source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

# -------------------- BACKGROUND --------------------
background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current
    color = rgb(0,0,0)
    blur_size = 3
    blur_passes = 2
    noise = 0.0117
    contrast = 1.3
    brightness = 0.8
    vibrancy = 0.21
    vibrancy_darkness = 0.0
}

# -------------------- DATE & TIME --------------------
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = $color13
    font_size = 64
    font_family = Victor Mono Bold 
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = $color8
    font_size = 173
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -133
    halign = center
    valign = top
}

# -------------------- USER & INPUT --------------------
label {
    monitor =
    text =   $USER
    color = $color9
    font_size = 48
    font_family = Victor Mono Bold Oblique
    position = 0, 300
    halign = center
    valign = bottom
}

input-field {
    monitor =
    size = 306, 93
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $color8
    inner_color = rgba(255,255,255,0.1)
    capslock_color = rgb(255,255,255)
    font_color = $color13
    fade_on_empty = false
    font_family = Victor Mono Bold Oblique
    placeholder_text = <i><span foreground="##ffffff99">🔒 Type Password</span></i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}

label {
    monitor =
    text = $LAYOUT
    color = $color8
    font_size = 19
    font_family = Victor Mono Bold Oblique
    position = 0, 53
    halign = center
    valign = bottom
}

# -------------------- SYSTEM INFO --------------------
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    color = $color8
    font_size = 32
    font_family = Victor Mono Bold Oblique
    position = 0, 0
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "<b> "$($Scripts/Battery.sh)" </b>"
    color = $color8
    font_size = 21
    font_family = Victor Mono Bold Oblique
    position = 0, 40
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat  "$HOME/.cache/.weather_cache"
    color = $color8
    font_size = 19
    font_family = Victor Mono Bold Oblique
    position = 50, 0
    halign = left
    valign = bottom
}
